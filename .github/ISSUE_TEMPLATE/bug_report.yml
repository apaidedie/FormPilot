name: Bug report
description: Report a reproducible FormPilot issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Keep examples safe: do not paste real full card numbers, CVV, SSN, API keys, or private addresses.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the broken behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: List the exact steps, page type, country/profile mode, and button or shortcut used.
      placeholder: |
        Open the extension popup.
        Choose United States and generate a profile.
        Click Fill on a registration form.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Popup UI
        - Form filling
        - Country generation
        - My Profile
        - Temporary inbox
        - AI mapping
        - Packaging or install
        - Documentation
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 126 on Windows 11
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: FormPilot version
      placeholder: 1.8.0
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks already run
      description: Paste relevant output from local checks when possible.
      placeholder: node scripts/verify-release.cjs
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include real full card numbers, CVV, SSN, API keys, or private credentials.
          required: true
